---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: remediation-webhook
  namespace: monitoring
  labels:
    app: remediation-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: remediation-webhook
  template:
    metadata:
      labels:
        app: remediation-webhook
    spec:
      serviceAccountName: remediation-webhook
      containers:
        - name: webhook
          image: your-dockerhub-user/remediation-webhook:latest
          ports:
            - containerPort: 5001
          env:
            - name: TARGET_NAMESPACE
              value: boutique-dev
            - name: DRY_RUN
              value: "false"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5001
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: remediation-webhook
  namespace: monitoring
spec:
  selector:
    app: remediation-webhook
  ports:
    - port: 5001
      targetPort: 5001
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: remediation-webhook
  namespace: monitoring
---
# RBAC — only allow what the webhook needs
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: remediation-webhook
  namespace: boutique-dev
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: remediation-webhook
  namespace: boutique-dev
subjects:
  - kind: ServiceAccount
    name: remediation-webhook
    namespace: monitoring
roleRef:
  kind: Role
  name: remediation-webhook
  apiGroup: rbac.authorization.k8s.io
