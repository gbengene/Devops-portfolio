---
# kind cluster config — local development
# Creates 1 control-plane + 2 worker nodes
# Exposes ports for Nginx Ingress so the app is reachable at localhost
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: boutique-local

nodes:
  - role: control-plane
    image: kindest/node:v1.31.2
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      - containerPort: 30000   # ArgoCD NodePort (fallback)
        hostPort: 30000
        protocol: TCP

  - role: worker
    image: kindest/node:v1.31.2
    labels:
      workload: app

  - role: worker
    image: kindest/node:v1.31.2
    labels:
      workload: monitoring
