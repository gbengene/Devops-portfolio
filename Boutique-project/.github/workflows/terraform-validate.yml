###############################################################
# Workflow: Terraform Validate (PR Check)
# Triggers on every PR that touches terraform/
# Runs: fmt check, validate, plan for BOTH dev and prod
# Posts plan output as a PR comment
###############################################################
name: Terraform Validate

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-*.yml"

permissions:
  contents: read
  pull-requests: write   # needed to post PR comments
  id-token: write        # needed for OIDC AWS auth

concurrency:
  group: terraform-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.8.5"
  AWS_REGION: "us-east-1"

jobs:
  ###############################################################
  # Format check — fails fast before anything expensive
  ###############################################################
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check formatting
        run: terraform fmt -check -recursive terraform/

  ###############################################################
  # Plan: DEV
  ###############################################################
  plan-dev:
    name: Plan — dev
    runs-on: ubuntu-latest
    needs: fmt
    environment: dev   # reads dev-scoped secrets
    defaults:
      run:
        working-directory: terraform/environments/dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="grafana_admin_password=${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform/environments/dev/plan-output.txt', 'utf8');
            const maxLen = 60000;
            const truncated = planOutput.length > maxLen
              ? planOutput.slice(0, maxLen) + '\n... (truncated)'
              : planOutput;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`dev\`\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  ###############################################################
  # Plan: PROD
  ###############################################################
  plan-prod:
    name: Plan — prod
    runs-on: ubuntu-latest
    needs: fmt
    environment: prod-plan   # read-only prod secrets for planning only
    defaults:
      run:
        working-directory: terraform/environments/prod

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="grafana_admin_password=${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform/environments/prod/plan-output.txt', 'utf8');
            const maxLen = 60000;
            const truncated = planOutput.length > maxLen
              ? planOutput.slice(0, maxLen) + '\n... (truncated)'
              : planOutput;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`prod\`\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
